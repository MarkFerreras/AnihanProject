<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Anihan SRMS — Student Record Management System Login">
    <title>Login — Anihan SRMS</title>

    <!-- Bootstrap 5.3 CSS (local) -->
    <link rel="stylesheet" href="css/bootstrap.min.css">

    <!-- Custom Login Styles -->
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

    <!-- Logout Notification (shown when redirected from logout) -->
    <div class="logout-notification" id="logoutNotification">
        ✅ You have been logged out successfully.
    </div>

    <!-- ===== HEADER ===== -->
    <header>
        <nav class="navbar login-navbar">
            <div class="container">
                <span class="navbar-brand">
                    <img src="images/logo.png" alt="Anihan Logo" class="navbar-logo">
                </span>
            </div>
        </nav>
    </header>

    <!-- ===== MAIN — Login Form ===== -->
    <main class="login-main">
        <div class="login-card">
            <div class="login-card-logo">
                <img src="images/logo2.png" alt="Anihan Logo" class="card-logo">
            </div>
            <h1 class="login-card-title">Welcome Back</h1>
            <p class="login-card-subtitle">Sign in to your account</p>

            <!-- Error Alert (hidden by default) -->
            <div class="alert alert-danger d-none" id="loginError" role="alert"></div>

            <form class="login-form" id="loginForm">
                <!-- Username -->
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input
                        type="text"
                        class="form-control"
                        id="username"
                        name="username"
                        placeholder="Enter your username"
                        autocomplete="username"
                        required
                    >
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input
                        type="password"
                        class="form-control"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <!-- Login Button -->
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-login" id="loginButton">
                        Log In
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="login-footer">
        <div class="container">
            <span>&copy; 2026 Anihan SRMS. All rights reserved.</span>
        </div>
    </footer>

    <!-- Bootstrap 5.3 JS Bundle (local) -->
    <script src="js/bootstrap.bundle.min.js"></script>

    <!-- Login Logic -->
    <script>
        // --- Session Check: redirect if already logged in ---
        (async function checkExistingSession() {
            try {
                const res = await fetch('/api/auth/me', { credentials: 'same-origin' });
                if (res.ok) {
                    const data = await res.json();
                    const routes = {
                        'ROLE_ADMIN': '/admin',
                        'ROLE_REGISTRAR': '/registrar',
                        'ROLE_TRAINER': '/trainer'
                    };
                    const destination = routes[data.role];
                    if (destination) {
                        window.location.replace(destination);
                        return;
                    }
                }
            } catch (e) {
                // Not logged in or network error — show login form
            }
        })();

        // --- Logout Notification ---
        (function showLogoutNotification() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('loggedOut') === 'true') {
                const banner = document.getElementById('logoutNotification');
                if (banner) {
                    banner.classList.add('show');
                    // Auto-dismiss after 3 seconds
                    setTimeout(function () {
                        banner.classList.remove('show');
                    }, 3000);
                }
                // Clean URL without reloading
                window.history.replaceState({}, '', '/index');
            }
        })();

        // --- Login Form Logic ---
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const loginButton = document.getElementById('loginButton');

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            // Hide previous error
            loginError.classList.add('d-none');
            loginError.textContent = '';

            // Disable button during request
            loginButton.disabled = true;
            loginButton.textContent = 'Logging in...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Route to dashboard based on role
                    const routes = {
                        'ROLE_ADMIN': '/admin',
                        'ROLE_REGISTRAR': '/registrar',
                        'ROLE_TRAINER': '/trainer'
                    };
                    const destination = routes[data.role] ?? '/index';
                    window.location.href = destination;
                } else {
                    // Display validation or auth errors
                    const errorMsg = data.errors
                        ? Object.values(data.errors).join('. ')
                        : data.message ?? 'Login failed. Please try again.';
                    loginError.textContent = errorMsg;
                    loginError.classList.remove('d-none');
                }
            } catch (error) {
                loginError.textContent = 'Unable to connect to the server. Please try again later.';
                loginError.classList.remove('d-none');
            } finally {
                loginButton.disabled = false;
                loginButton.textContent = 'Log In';
            }
        });
    </script>

</body>

</html>
