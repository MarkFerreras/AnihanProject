<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Anihan SRMS — Trainer Dashboard">
    <title>Trainer Dashboard — Anihan SRMS</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; background-color: var(--color-off-white); }
        main { flex: 1; }
    </style>
</head>

<body data-required-role="ROLE_TRAINER">

    <!-- ===== HEADER ===== -->
    <header>
        <nav class="navbar login-navbar">
            <div class="container d-flex justify-content-between align-items-center">
                <span class="navbar-brand mb-0 h1">
                    <img src="images/logo.png" alt="Anihan Logo" class="navbar-logo">
                </span>
                <span class="text-white fw-bold">Trainer Portal</span>

                <div class="account-dropdown dropdown">
                    <button class="account-icon-btn dropdown-toggle" type="button"
                            id="accountDropdownBtn" data-bs-toggle="dropdown"
                            aria-expanded="false" aria-label="Account menu">
                        <span id="accountInitial">—</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="accountDropdownBtn">
                        <li class="account-dropdown-header">
                            <p class="account-dropdown-name" id="accountDropdownName">Loading...</p>
                            <p class="account-dropdown-role" id="accountDropdownRole">—</p>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item" href="#" id="editAccountBtn"
                               data-bs-toggle="modal" data-bs-target="#editAccountModal">Edit Account</a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item dropdown-item-logout" href="#" id="logoutBtn">Log Out</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5"></main>

    <footer class="login-footer mt-auto">
        <div class="container">
            <span>&copy; 2026 Anihan SRMS. All rights reserved.</span>
        </div>
    </footer>

    <!-- ===== EDIT ACCOUNT MODAL (Tabbed) ===== -->
    <div class="modal fade edit-account-modal" id="editAccountModal" tabindex="-1"
         aria-labelledby="editAccountModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editAccountModalLabel">Edit Account</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <ul class="nav nav-tabs" id="editAccountTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="tab-personal" data-bs-toggle="tab"
                                    data-bs-target="#pane-personal" type="button" role="tab"
                                    aria-controls="pane-personal" aria-selected="true">Personal Details</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="tab-account" data-bs-toggle="tab"
                                    data-bs-target="#pane-account" type="button" role="tab"
                                    aria-controls="pane-account" aria-selected="false">Account Settings</button>
                        </li>
                    </ul>
                    <div class="tab-content" id="editAccountTabContent">
                        <div class="tab-pane fade show active" id="pane-personal" role="tabpanel" aria-labelledby="tab-personal">
                            <div class="alert d-none" id="personalDetailsAlert" role="alert"></div>
                            <form id="personalDetailsForm">
                                <div>
                                    <label for="lastName" class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="lastName" placeholder="Enter last name" autocomplete="family-name">
                                </div>
                                <div class="mt-3">
                                    <label for="firstName" class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="firstName" placeholder="Enter first name" autocomplete="given-name">
                                </div>
                                <div class="mt-3">
                                    <label for="middleName" class="form-label">Middle Name</label>
                                    <input type="text" class="form-control" id="middleName" placeholder="Enter middle name" autocomplete="additional-name">
                                </div>
                                <div class="row mt-3">
                                    <div class="col-md-6 mb-3 mb-md-0">
                                        <label class="form-label">Age</label>
                                        <p class="form-control-plaintext" id="ageDisplay">-</p>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="birthdate" class="form-label">Date of Birth</label>
                                        <input type="date" class="form-control" id="birthdate">
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-save">Save Details</button>
                            </form>
                        </div>
                        <div class="tab-pane fade" id="pane-account" role="tabpanel" aria-labelledby="tab-account">
                            <h6 class="section-title">Change Username</h6>
                            <div class="alert d-none" id="usernameChangeAlert" role="alert"></div>
                            <form id="usernameChangeForm">
                                <div class="mb-3">
                                    <label for="newUsername" class="form-label">New Username</label>
                                    <input type="text" class="form-control" id="newUsername" placeholder="Enter new username" autocomplete="username" required>
                                </div>
                                <div class="mb-3">
                                    <label for="usernameCurrentPassword" class="form-label">Current Password</label>
                                    <input type="password" class="form-control" id="usernameCurrentPassword" placeholder="Enter current password" autocomplete="current-password" minlength="8" required>
                                </div>
                                <button type="submit" class="btn btn-save">Save Username</button>
                            </form>
                            <hr>
                            <h6 class="section-title">Change Password</h6>
                            <div class="alert d-none" id="passwordChangeAlert" role="alert"></div>
                            <form id="passwordChangeForm">
                                <div class="mb-3">
                                    <label for="currentPassword" class="form-label">Current Password</label>
                                    <input type="password" class="form-control" id="currentPassword" placeholder="Enter current password" autocomplete="current-password" minlength="8" required>
                                </div>
                                <div class="mb-3">
                                    <label for="changeNewPassword" class="form-label">New Password</label>
                                    <input type="password" class="form-control" id="changeNewPassword" placeholder="Enter new password" autocomplete="new-password" minlength="8" required>
                                    <div class="form-text">Min 8 characters, with uppercase, lowercase, number, and special character.</div>
                                </div>
                                <div class="mb-3">
                                    <label for="confirmNewPassword" class="form-label">Confirm New Password</label>
                                    <input type="password" class="form-control" id="confirmNewPassword" placeholder="Confirm new password" autocomplete="new-password" minlength="8" required>
                                </div>
                                <button type="submit" class="btn btn-save">Save Password</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/auth-guard.js"></script>
</body>
</html>
