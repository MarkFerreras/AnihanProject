                        <tr><th>Username</th><td id="modalUsername"></td></tr>

                        <tr><th>Role</th><td id="modalRole"></td></tr>
                        <tr><th>Last Name</th><td id="modalLastName"></td></tr>
                        <tr><th>First Name</th><td id="modalFirstName"></td></tr>
                        <tr><th>Middle Name</th><td id="modalMiddleName"></td></tr>

    <!-- Bootstrap 5.3 JS Bundle (local) -->
    <script src="js/bootstrap.bundle.min.js"></script>
    
    <!-- jQuery and DataTables -->
    <script src="js/jquery-4.0.0.min.js"></script>
    <script src="js/datatables.min.js"></script>

    <script>
        $(document).ready(function() {
            // Initialize DataTable
            const table = $('#usersTable').DataTable({
                ajax: {
                    url: '/api/admin/users',
                    dataSrc: ''
                },
                columns: [
                    { data: 'userId' },
                    { data: 'role' },
                    { 
                        data: null, 
                        render: function(data, type, row) {
                            const last = row.lastname;
                            const first = row.firstname;
                            const middle = row.middlename;

                            // If any name piece is missing entirely (all null), you requested to display NULL.
                            if (!last && !first && !middle) {
                                return 'NULL';
                            }
                            
                            // Format: Lastname, Firstname, Middlename
                            const parts = [];
                            if (last) parts.push(last);
                            if (first) parts.push(first);
                            if (middle) parts.push(middle);
                            
                            return parts.join(', ');
                        }
                    },
                    { 
                        data: 'email',
                        render: function(data) {
                            return data ? data : 'NULL';
                        }
                    },
                    {
                        data: null,
                        orderable: false,
                        render: function(data, type, row) {
                            return `<button class="btn btn-sm btn-outline-primary expand-btn" data-id="${row.userId}">Expand</button>`;
                        }
                    }
                ],
                responsive: true,
                language: {
                    emptyTable: "No users found."
                }
            });

            // Handle Expand Button click
            $('#usersTable tbody').on('click', '.expand-btn', function() {
                const userId = $(this).data('id');
                
                // Fetch details for the specific user
                $.ajax({
                    url: '/api/admin/users/' + userId,
                    method: 'GET',
                    success: function(user) {
                        // Populate modal table
                        $('#modalUserId').text(user.userId);
                        $('#modalUsername').text(user.username);
                        $('#modalEmail').text(user.email ? user.email : 'NULL');
                        $('#modalRole').text(user.role);
                        $('#modalLastName').text(user.lastname ? user.lastname : 'NULL');
                        $('#modalFirstName').text(user.firstname ? user.firstname : 'NULL');
                        $('#modalMiddleName').text(user.middlename ? user.middlename : 'NULL');
                        $('#modalAge').text(user.age ? user.age : 'NULL');
                        $('#modalBirthdate').text(user.birthdate ? user.birthdate : 'NULL');
                        
                        // Update button links
                        $('#modalEditBtn').attr('href', 'edit-user.html?id=' + user.userId);
                        $('#modalLogBtn').attr('href', 'logs.html?user=' + user.userId);

                        // Show modal
                        var userModal = new bootstrap.Modal(document.getElementById('userDetailsModal'));
                        userModal.show();
                    },
                    error: function() {
                        alert("Failed to load user details.");
                    }
                });
            });
        });
    </script>
</body>
    <!-- ===== EDIT ACCOUNT MODAL (Tabbed) ===== -->
    <div class="modal fade edit-account-modal" id="editAccountModal" tabindex="-1"

        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">

                </div>

                                Personal Details
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="tab-account" data-bs-toggle="tab"
                                data-bs-target="#pane-account" type="button" role="tab"
                                aria-controls="pane-account" aria-selected="false">
                                Account Settings
                            </button>
                        </li>
                    </ul>

                    <div class="tab-content" id="editAccountTabContent">
                        <div class="tab-pane fade show active" id="pane-personal" role="tabpanel"
                            aria-labelledby="tab-personal">
                            <div class="alert d-none" id="personalDetailsAlert" role="alert"></div>
                            <form id="personalDetailsForm">
                                <div>
                                    <label for="lastName" class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="lastName"
                                        placeholder="Enter last name" autocomplete="family-name">
                                </div>
                                <div class="mt-3">
                                    <label for="firstName" class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="firstName"
                                        placeholder="Enter first name" autocomplete="given-name">
                                </div>
                                <div class="mt-3">
                                    <label for="middleName" class="form-label">Middle Name</label>
                                    <input type="text" class="form-control" id="middleName"
                                        placeholder="Enter middle name" autocomplete="additional-name">
                                </div>
                                <div class="row mt-3">
                                    <div class="col-md-6 mb-3 mb-md-0">
                                        <label for="age" class="form-label">Age</label>
                                        <input type="number" class="form-control" id="age" min="1" max="150"
                                            placeholder="e.g. 30">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="birthdate" class="form-label">Date of Birth</label>
                                        <input type="date" class="form-control" id="birthdate">
                                    </div>
                                </div>

                                <div id="trainerFields" class="trainer-only-fields">
                                    <hr>
                                    <h6 class="section-title">Trainer Assignment</h6>
                                    <div class="mb-3">
                                        <label for="subjectCode" class="form-label">Subject</label>
                                        <select class="form-select" id="subjectCode">
                                            <option value="">Select Subject</option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label for="sectionCode" class="form-label">Section Handled</label>
                                        <select class="form-select" id="sectionCode">
                                            <option value="">Select Section</option>
                                        </select>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-save">Save Details</button>
                            </form>
                        </div>

                        <div class="tab-pane fade" id="pane-account" role="tabpanel"
                            aria-labelledby="tab-account">
                            <h6 class="section-title">Change Username</h6>
                            <div class="alert d-none" id="usernameChangeAlert" role="alert"></div>
                            <form id="usernameChangeForm">
                                <div class="mb-3">
                                    <label for="newUsername" class="form-label">New Username</label>
                                    <input type="text" class="form-control" id="newUsername"
                                        placeholder="Enter new username" autocomplete="username" required>
                                </div>
                                <div class="mb-3">
                                    <label for="usernameCurrentPassword" class="form-label">Current Password</label>
                                    <input type="password" class="form-control" id="usernameCurrentPassword"
                                        placeholder="Enter current password" autocomplete="current-password" required>
                                </div>
                                <button type="submit" class="btn btn-save">Save Username</button>
                            </form>

                            <hr>

                            <h6 class="section-title">Change Password</h6>
                            <div class="alert d-none" id="passwordChangeAlert" role="alert"></div>
                            <form id="passwordChangeForm">
                                <div class="mb-3">
                                    <label for="currentPassword" class="form-label">Current Password</label>
                                    <input type="password" class="form-control" id="currentPassword"
                                        placeholder="Enter current password" autocomplete="current-password" required>
                                </div>
                                <div class="mb-3">
                                    <label for="changeNewPassword" class="form-label">New Password</label>
                                    <input type="password" class="form-control" id="changeNewPassword"
                                        placeholder="Enter new password" autocomplete="new-password" required>
                                </div>
                                <div class="mb-3">
                                    <label for="confirmNewPassword" class="form-label">Confirm New Password</label>
                                    <input type="password" class="form-control" id="confirmNewPassword"
                                        placeholder="Confirm new password" autocomplete="new-password" required>
                                </div>
                                <button type="submit" class="btn btn-save">Save Password</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
