<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Anihan SRMS — Student Portal">
    <title>Student Portal — Anihan SRMS</title>

    <!-- Bootstrap 5.3 CSS (local) -->
    <link rel="stylesheet" href="css/bootstrap.min.css">

    <!-- Custom Login Styles (shared look) -->
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header>
        <nav class="navbar login-navbar">
            <div class="container">
                <span class="navbar-brand">
                    <img src="images/logo.png" alt="Anihan Logo" class="navbar-logo">
                </span>
            </div>
        </nav>
    </header>

    <!-- ===== MAIN — Student Name Form ===== -->
    <main class="login-main">
        <div class="login-card">
            <div class="login-card-logo">
                <img src="images/logo2.png" alt="Anihan Logo" class="card-logo">
            </div>
            <h1 class="login-card-title">Student Portal</h1>
            <p class="login-card-subtitle">Enter your name to begin enrollment</p>

            <!-- Duplicate Record Alert (hidden by default) -->
            <div class="alert alert-warning d-none" id="duplicateAlert" role="alert">
                <strong>⚠️ Existing Record Found</strong><br>
                A student record with the same name already exists in the system. Please contact the Registrar's office if you believe this is an error.
            </div>

            <!-- Error Alert (hidden by default) -->
            <div class="alert alert-danger d-none" id="portalError" role="alert"></div>

            <form class="login-form" id="studentPortalForm">
                <!-- Last Name -->
                <div class="mb-3">
                    <label for="lastName" class="form-label">Last Name</label>
                    <input
                        type="text"
                        class="form-control"
                        id="lastName"
                        name="lastName"
                        placeholder="Enter your last name"
                        autocomplete="family-name"
                        required
                    >
                </div>

                <!-- First Name -->
                <div class="mb-3">
                    <label for="firstName" class="form-label">First Name</label>
                    <input
                        type="text"
                        class="form-control"
                        id="firstName"
                        name="firstName"
                        placeholder="Enter your first name"
                        autocomplete="given-name"
                        required
                    >
                </div>

                <!-- Middle Name -->
                <div class="mb-3">
                    <label for="middleName" class="form-label">Middle Name</label>
                    <input
                        type="text"
                        class="form-control"
                        id="middleName"
                        name="middleName"
                        placeholder="Enter your middle name"
                        autocomplete="additional-name"
                        required
                    >
                </div>

                <!-- Submit Button -->
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-login" id="submitButton">
                        Continue
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="login-footer">
        <div class="container">
            <span>&copy; 2026 Anihan SRMS. All rights reserved.</span>
        </div>
    </footer>

    <!-- Bootstrap 5.3 JS Bundle (local) -->
    <script src="js/bootstrap.bundle.min.js"></script>

    <!-- Student Portal Logic -->
    <script src="js/student-portal.js"></script>

</body>

</html>
